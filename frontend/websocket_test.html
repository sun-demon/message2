<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test - message2</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        #messages { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .message { padding: 5px; margin: 5px 0; border-radius: 5px; }
        .received { background: #e3f2fd; }
        .sent { background: #f1f8e9; }
        .status { color: #666; font-style: italic; }
        button { margin: 2px; }
    </style>
</head>
<body>
    <h2>🔌 WebSocket Test Client - message2</h2>
    
    <div>
        <label>JWT Token:</label><br>
        <input type="text" id="token" size="80" placeholder="Paste your JWT token here">
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>
    
    <div id="connectionStatus" style="margin: 10px 0; padding: 5px; background: #ffeb3b;">Disconnected</div>
    
    <div id="chatControls" style="display: none;">
        <h3>Chat Controls</h3>
        
        <div>
            <label>Chat ID:</label>
            <input type="number" id="chatId" value="1">
            <button onclick="joinChat()">Join Chat</button>
            <button onclick="leaveChat()">Leave Chat</button>
        </div>
        
        <div style="margin: 10px 0;">
            <label>Message:</label><br>
            <input type="text" id="messageContent" size="50" placeholder="Type your message...">
            <button onclick="sendMessage()">Send Message</button>
        </div>
        
        <div>
            <button onclick="startTyping()">Start Typing</button>
            <button onclick="stopTyping()">Stop Typing</button>
        </div>
    </div>
    
    <h3>Messages</h3>
    <div id="messages"></div>

    <script>
        let socket = null;
        let connected = false;
        
        function log(data, type = 'received') {
            const messagesDiv = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            messageEl.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong> - ${JSON.stringify(data, null, 2)}`;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function updateConnectionStatus(status, color) {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.textContent = status;
            statusDiv.style.background = color;
            
            document.getElementById('chatControls').style.display = connected ? 'block' : 'none';
        }
        
        function connect() {
            const token = document.getElementById('token').value.trim();
            if (!token) {
                alert('Please enter a token');
                return;
            }
            
            socket = new WebSocket(`ws://localhost:8000/ws?token=${token}`);
            
            socket.onopen = () => {
                connected = true;
                updateConnectionStatus('Connected', '#4caf50');
                log({ type: 'connection', status: 'connected' }, 'status');
            };
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'ping') {
                    // Respond to ping
                    socket.send(JSON.stringify({ type: 'pong' }));
                } else {
                    log(data, data.type === 'error' ? 'error' : 'received');
                }
            };
            
            socket.onclose = () => {
                connected = false;
                updateConnectionStatus('Disconnected', '#ffeb3b');
                log({ type: 'connection', status: 'disconnected' }, 'status');
            };
            
            socket.onerror = (error) => {
                log({ type: 'error', error: error.toString() }, 'error');
            };
        }
        
        function disconnect() {
            if (socket) {
                socket.close();
            }
        }
        
        function joinChat() {
            if (!connected) return;
            const chatId = document.getElementById('chatId').value;
            socket.send(JSON.stringify({
                type: 'join_chat',
                chat_id: parseInt(chatId)
            }));
            log({ type: 'sent', data: { type: 'join_chat', chat_id: chatId } }, 'sent');
        }
        
        function leaveChat() {
            if (!connected) return;
            const chatId = document.getElementById('chatId').value;
            socket.send(JSON.stringify({
                type: 'leave_chat',
                chat_id: parseInt(chatId)
            }));
            log({ type: 'sent', data: { type: 'leave_chat', chat_id: chatId } }, 'sent');
        }
        
        function sendMessage() {
            if (!connected) return;
            const chatId = document.getElementById('chatId').value;
            const content = document.getElementById('messageContent').value;
            
            if (!content) return;
            
            socket.send(JSON.stringify({
                type: 'send_message',
                message: {
                    chat_id: parseInt(chatId),
                    content: content,
                    message_type: 'text'
                }
            }));
            
            log({ type: 'sent', data: { type: 'send_message', chat_id: chatId, content: content } }, 'sent');
            document.getElementById('messageContent').value = '';
        }
        
        function startTyping() {
            if (!connected) return;
            const chatId = document.getElementById('chatId').value;
            socket.send(JSON.stringify({
                type: 'typing_start',
                chat_id: parseInt(chatId)
            }));
            log({ type: 'sent', data: { type: 'typing_start', chat_id: chatId } }, 'sent');
        }
        
        function stopTyping() {
            if (!connected) return;
            const chatId = document.getElementById('chatId').value;
            socket.send(JSON.stringify({
                type: 'typing_stop',
                chat_id: parseInt(chatId)
            }));
            log({ type: 'sent', data: { type: 'typing_stop', chat_id: chatId } }, 'sent');
        }
    </script>
</body>
</html>
